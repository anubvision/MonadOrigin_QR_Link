<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Monad Origin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #080808;
    --white: #f5f0e8;
    --dim: #2a2a2a;
    --mid: #444;
    --muted: #666;
    --accent: #c8b89a;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-mono: 'Courier Prime', 'Courier New', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    margin-bottom: 3.5rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.1s ease forwards;
  }

  .header-rule {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto 1.5rem;
  }

  .brand {
    font-family: var(--font-display);
    font-size: 2.6rem;
    font-weight: 300;
    letter-spacing: 0.3em;
    color: var(--white);
    text-transform: uppercase;
  }

  .tagline {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-top: 0.5rem;
  }

  /* ── MAIN QR ── */
  .main-qr-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.3s ease forwards;
  }

  .qr-label {
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .main-qr-frame {
    border: 1px solid var(--dim);
    padding: 14px;
    background: var(--white);
    position: relative;
  }

  .main-qr-frame::before,
  .main-qr-frame::after {
    content: '';
    position: absolute;
    width: 10px;
    height: 10px;
    border-color: var(--accent);
    border-style: solid;
  }
  .main-qr-frame::before { top: -3px; left: -3px; border-width: 2px 0 0 2px; }
  .main-qr-frame::after  { bottom: -3px; right: -3px; border-width: 0 2px 2px 0; }

  /* ── GRID ── */
  .links-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border: 1px solid var(--dim);
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.5s ease forwards;
  }

  .link-card {
    background: var(--black);
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    border: 1px solid transparent;
    position: relative;
  }

  .link-card:hover { background: #0f0f0f; }
  .link-card:active { background: #141414; }

  /* dividers via background on grid */
  .links-grid { background: var(--dim); }
  .link-card { margin: 1px; }

  .link-icon {
    width: 32px;
    height: 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.7;
  }

  .link-icon svg { width: 20px; height: 20px; stroke: var(--white); fill: none; stroke-width: 1.2; }

  .mini-qr-wrap {
    background: var(--white);
    padding: 4px;
  }

  .card-name {
    font-size: 0.6rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .card-hint {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: var(--dim);
    color: #3a3a3a;
  }

  /* contact card — spans full width */
  .link-card.contact {
    grid-column: 1 / -1;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1.2rem 1rem;
  }

  .link-card.contact .card-text { text-align: left; }
  .link-card.contact .card-name { color: var(--accent); }

  /* ── CONTACT FORM ── */
  .contact-section {
    opacity: 0;
    animation: fadeUp 0.9s 0.7s ease forwards;
  }

  .section-heading {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--white);
    text-align: center;
    margin-bottom: 0.4rem;
  }

  .section-rule {
    width: 24px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto 2rem;
  }

  .form-field {
    margin-bottom: 1rem;
  }

  .form-field label {
    display: block;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-field input,
  .form-field textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--dim);
    padding: 8px 0;
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-field input:focus,
  .form-field textarea:focus { border-bottom-color: var(--accent); }

  .form-field input::placeholder,
  .form-field textarea::placeholder { color: #2e2e2e; }

  .form-field textarea { resize: none; height: 80px; }

  .submit-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--mid);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }

  .submit-btn:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--black);
  }

  .form-success {
    display: none;
    text-align: center;
    padding: 2rem 0;
  }

  .form-success .success-icon {
    font-size: 1.5rem;
    margin-bottom: 0.75rem;
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 2rem;
  }

  .form-success p {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 3.5rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.9s ease forwards;
  }

  .footer-rule {
    width: 100%;
    height: 1px;
    background: var(--dim);
    margin-bottom: 1.5rem;
  }

  .footer-text {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: #2e2e2e;
    text-transform: uppercase;
  }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 360px) {
    .brand { font-size: 2rem; }
    .page { padding: 2rem 1rem 3rem; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <header class="header">
    <div class="header-rule"></div>
    <h1 class="brand">Monad Origin</h1>
    <p class="tagline">Scan · Connect · Discover</p>
  </header>

  <!-- MAIN QR -->
  <section class="main-qr-section">
    <p class="qr-label">This page</p>
    <div class="main-qr-frame" id="main-qr"></div>
  </section>

  <!-- LINK CARDS -->
  <div class="links-grid">

    <a class="link-card" href="https://www.dropbox.com/scl/fo/271viwtxlkjokfzbc17xg/AHPWlmc0UWFOdMwYF8_8WR4?rlkey=fw2lj32j0ps135u3saeqbkna0&st=mg2qaaf0&dl=0" target="_blank" rel="noopener">
      <div class="link-icon">
        <svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
      <div class="mini-qr-wrap" id="qr-music"></div>
      <span class="card-name">Music</span>
      <span class="card-hint">Listen now</span>
    </a>

    <a class="link-card" href="https://www.monadorigin.com" target="_blank" rel="noopener">
      <div class="link-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
      </div>
      <div class="mini-qr-wrap" id="qr-web"></div>
      <span class="card-name">Website</span>
      <span class="card-hint">monadorigin.com</span>
    </a>

    <a class="link-card" href="https://www.instagram.com/monadorigin" target="_blank" rel="noopener">
      <div class="link-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.8" fill="#f5f0e8" stroke="none"/></svg>
      </div>
      <div class="mini-qr-wrap" id="qr-ig"></div>
      <span class="card-name">Instagram</span>
      <span class="card-hint">@monadorigin</span>
    </a>

    <a class="link-card" href="#contact" onclick="event.preventDefault(); document.getElementById('contact').scrollIntoView({behavior:'smooth'})">
      <div class="link-icon">
        <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <div style="width:60px;height:60px;display:flex;align-items:center;justify-content:center;border:1px solid #222;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="#333" stroke-width="1.2"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
      </div>
      <span class="card-name">Contact</span>
      <span class="card-hint">Scroll down</span>
    </a>

  </div>

  <!-- CONTACT FORM -->
  <section class="contact-section" id="contact">
    <h2 class="section-heading">Get in touch</h2>
    <div class="section-rule"></div>

    <div id="contact-form">
      <div class="form-field">
        <label for="cf-name">Name</label>
        <input type="text" id="cf-name" placeholder="Your name" autocomplete="name" />
      </div>
      <div class="form-field">
        <label for="cf-email">Email</label>
        <input type="email" id="cf-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-field">
        <label for="cf-msg">Message</label>
        <textarea id="cf-msg" placeholder="What's on your mind..."></textarea>
      </div>
      <button class="submit-btn" onclick="submitForm()">Send message</button>
    </div>

    <div class="form-success" id="form-success">
      <div class="success-icon">✦</div>
      <p>Message received</p>
      <p style="margin-top:6px; color:#2e2e2e;">We'll be in touch soon.</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-rule"></div>
    <p class="footer-text">© 2025 Monad Origin — All rights reserved</p>
  </footer>

</div>

<script>
  function makeQR(id, url, size) {
    new QRCode(document.getElementById(id), {
      text: url,
      width: size,
      height: size,
      colorDark: '#000000',
      colorLight: '#f5f0e8',
      correctLevel: QRCode.CorrectLevel.M
    });
  }

  window.addEventListener('load', function () {
    var pageUrl = window.location.href;
    makeQR('main-qr', pageUrl, 130);
    makeQR('qr-music', 'https://www.dropbox.com/scl/fo/271viwtxlkjokfzbc17xg/AHPWlmc0UWFOdMwYF8_8WR4?rlkey=fw2lj32j0ps135u3saeqbkna0&st=mg2qaaf0&dl=0', 60);
    makeQR('qr-web', 'https://www.monadorigin.com', 60);
    makeQR('qr-ig', 'https://www.instagram.com/monadorigin', 60);
  });

  function submitForm() {
    var name = document.getElementById('cf-name').value.trim();
    var email = document.getElementById('cf-email').value.trim();
    var msg = document.getElementById('cf-msg').value.trim();
    if (!name || !email) {
      alert('Please enter your name and email.');
      return;
    }
    document.getElementById('contact-form').style.display = 'none';
    document.getElementById('form-success').style.display = 'block';
  }
</script>
</body>
</html>
