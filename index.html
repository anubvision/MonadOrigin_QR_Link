<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
<title>Monad Origin</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --black: #080808;
    --white: #f5f0e8;
    --dim: #2a2a2a;
    --mid: #444;
    --muted: #666;
    --accent: #c8b89a;
    --font-display: 'Cormorant Garamond', Georgia, serif;
    --font-mono: 'Courier Prime', 'Courier New', monospace;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--black);
    color: var(--white);
    font-family: var(--font-mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* noise texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.6;
  }

  .page {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 3rem 1.5rem 4rem;
  }

  /* ── HEADER WITH LOGO ── */
  .header {
    text-align: center;
    margin-bottom: 3rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.1s ease forwards;
  }

  .header-rule {
    width: 40px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto 1.5rem;
  }

  .logo {
    max-width: 200px;
    width: 100%;
    height: auto;
    margin: 0 auto;
    display: block;
  }

  /* ── MAIN SECTION (no symbol) ── */
  .main-spacer {
    height: 1rem;
  }

  /* ── GRID ── */
  .links-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1px;
    border: 1px solid var(--dim);
    margin-bottom: 2rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.4s ease forwards;
  }

  .link-card {
    background: var(--black);
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    transition: background 0.2s;
    text-decoration: none;
    border: 1px solid transparent;
    position: relative;
  }

  .link-card:hover { background: #0f0f0f; }
  .link-card:active { background: #141414; }

  .links-grid { background: var(--dim); }
  .link-card { margin: 1px; }

  .link-icon {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.8;
  }

  .link-icon svg { width: 22px; height: 22px; stroke: var(--white); fill: none; stroke-width: 1.3; }

  .card-name {
    font-size: 0.65rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--white);
    font-weight: 500;
  }

  .card-hint {
    font-size: 0.55rem;
    letter-spacing: 0.1em;
    color: #5a5a5a;
  }

  /* contact card */
  .link-card.contact {
    grid-column: 1 / -1;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    padding: 1rem 1rem;
    background: #0c0c0c;
    border: 1px solid var(--dim);
  }

  .link-card.contact .card-name { 
    color: var(--accent); 
    font-size: 0.75rem;
  }

  .contact-arrow {
    font-size: 1rem;
    transition: transform 0.2s;
  }
  .link-card.contact:hover .contact-arrow {
    transform: translateX(4px);
  }

  /* ── CONTACT FORM (hidden by default) ── */
  .contact-section {
    margin-top: 2rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.7s ease forwards;
    display: none;
  }

  .contact-section.visible {
    display: block;
  }

  .section-heading {
    font-family: var(--font-display);
    font-size: 1.4rem;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--white);
    text-align: center;
    margin-bottom: 0.4rem;
  }

  .section-rule {
    width: 24px;
    height: 1px;
    background: var(--accent);
    margin: 0 auto 2rem;
  }

  .form-field {
    margin-bottom: 1rem;
  }

  .form-field label {
    display: block;
    font-size: 0.58rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }

  .form-field input,
  .form-field textarea {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--dim);
    padding: 8px 0;
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-field input:focus,
  .form-field textarea:focus { border-bottom-color: var(--accent); }

  .form-field input::placeholder,
  .form-field textarea::placeholder { color: #2e2e2e; }

  .form-field textarea { resize: none; height: 80px; }

  .submit-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--mid);
    color: var(--white);
    font-family: var(--font-mono);
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 14px;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: border-color 0.2s, background 0.2s, color 0.2s;
  }

  .submit-btn:hover {
    border-color: var(--accent);
    background: var(--accent);
    color: var(--black);
  }

  .form-success {
    display: none;
    text-align: center;
    padding: 2rem 0;
  }

  .form-success .success-icon {
    margin-bottom: 0.75rem;
    color: var(--accent);
    font-family: var(--font-display);
    font-size: 2rem;
  }

  .form-success p {
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* audio player hidden */
  .hidden-audio-player {
    display: none;
  }

  /* toast message */
  .toast-msg {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    background: #1a1a1a;
    color: var(--accent);
    padding: 8px 18px;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    border: 1px solid var(--dim);
    border-radius: 40px;
    font-family: var(--font-mono);
    z-index: 200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s;
    white-space: nowrap;
  }
  .toast-msg.show {
    opacity: 1;
  }

  /* ── FOOTER ── */
  .footer {
    text-align: center;
    margin-top: 3rem;
    opacity: 0;
    animation: fadeUp 0.9s 0.9s ease forwards;
  }

  .footer-rule {
    width: 100%;
    height: 1px;
    background: var(--dim);
    margin-bottom: 1.5rem;
  }

  .footer-text {
    font-size: 0.55rem;
    letter-spacing: 0.2em;
    color: #2e2e2e;
    text-transform: uppercase;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 360px) {
    .logo { max-width: 150px; }
    .page { padding: 2rem 1rem 3rem; }
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER WITH LOGO -->
  <header class="header">
    <div class="header-rule"></div>
    <img src="Monad-Origin-Logo-08.png" alt="Monad Origin" class="logo" />
  </header>

  <div class="main-spacer"></div>

  <!-- LINK CARDS -->
  <div class="links-grid">

    <!-- MUSIC CARD: plays texturebymonadoriginLQ.mp3 -->
    <div class="link-card" id="music-card" style="cursor: pointer;">
      <div class="link-icon">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <path d="M9 18V5l12-2v13" stroke="currentColor"/>
          <circle cx="6" cy="18" r="3" stroke="currentColor"/>
          <circle cx="18" cy="16" r="3" stroke="currentColor"/>
          <path d="M9 10l12-2" stroke="currentColor" stroke-width="1"/>
        </svg>
      </div>
      <div class="link-icon" style="width: auto;">
        <span style="font-size: 0.7rem; letter-spacing: 2px;">▶</span>
      </div>
      <span class="card-name">Music</span>
      <span class="card-hint">Listen now — instant playback</span>
    </div>

    <!-- WEBSITE -->
    <a class="link-card" href="https://www.monadorigin.com" target="_blank" rel="noopener">
      <div class="link-icon">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <circle cx="12" cy="12" r="10"/>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
      </div>
      <span class="card-name">Website</span>
      <span class="card-hint">monadorigin.com</span>
    </a>

    <!-- INSTAGRAM -->
    <a class="link-card" href="https://www.instagram.com/monadorigin" target="_blank" rel="noopener">
      <div class="link-icon">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <rect x="2" y="2" width="20" height="20" rx="5"/>
          <circle cx="12" cy="12" r="4"/>
          <circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/>
        </svg>
      </div>
      <span class="card-name">Instagram</span>
      <span class="card-hint">@monadorigin</span>
    </a>

    <!-- CONTACT CARD: reveals the contact form -->
    <div class="link-card contact" id="contact-trigger">
      <div class="link-icon">
        <svg viewBox="0 0 24 24" stroke="currentColor" fill="none">
          <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
        </svg>
      </div>
      <span class="card-name">Contact</span>
      <span class="contact-arrow">▼</span>
      <span class="card-hint">tap to open form</span>
    </div>
  </div>

  <!-- CONTACT FORM (hidden by default) -->
  <section class="contact-section" id="contact-section">
    <h2 class="section-heading">Get in touch</h2>
    <div class="section-rule"></div>

    <div id="contact-form-ui">
      <div class="form-field">
        <label for="cf-name">Name</label>
        <input type="text" id="cf-name" placeholder="Your name" autocomplete="name" />
      </div>
      <div class="form-field">
        <label for="cf-email">Email</label>
        <input type="email" id="cf-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-field">
        <label for="cf-msg">Message</label>
        <textarea id="cf-msg" placeholder="What's on your mind..."></textarea>
      </div>
      <button class="submit-btn" id="sendMsgBtn">Send message</button>
    </div>

    <div class="form-success" id="form-success">
      <div class="success-icon">✦</div>
      <p>Message received</p>
      <p style="margin-top:6px; color:#2e2e2e;">We'll be in touch soon.</p>
    </div>
  </section>

  <!-- FOOTER -->
  <footer class="footer">
    <div class="footer-rule"></div>
    <p class="footer-text">© 2025 Monad Origin — All rights reserved</p>
  </footer>
</div>

<!-- hidden audio element for music playback -->
<audio id="monadAudio" preload="auto">
  <source src="texturebymonadoriginLQ.mp3" type="audio/mpeg">
  Your browser does not support the audio element.
</audio>

<div id="toastMsg" class="toast-msg">♫  now playing  ♫</div>

<script>
  (function() {
    // Get audio element
    const audio = document.getElementById('monadAudio');
    let isPlaying = false;
    
    function playMusic() {
      // Resume audio context if needed (for modern browsers)
      if (audio) {
        audio.play().then(() => {
          isPlaying = true;
          // Show toast notification
          const toast = document.getElementById('toastMsg');
          toast.classList.add('show');
          setTimeout(() => {
            toast.classList.remove('show');
          }, 2000);
        }).catch(error => {
          console.log('Playback failed:', error);
          // Fallback: show message
          alert('Click anywhere on the page first to enable audio playback, then try again.');
        });
      }
    }
    
    // Attach music card click event
    const musicCard = document.getElementById('music-card');
    if (musicCard) {
      musicCard.addEventListener('click', (e) => {
        e.preventDefault();
        playMusic();
      });
    }
    
    // ---------- CONTACT FORM TOGGLE ----------
    const contactTrigger = document.getElementById('contact-trigger');
    const contactSection = document.getElementById('contact-section');
    
    function showContactForm() {
      if (!contactSection) return;
      contactSection.classList.add('visible');
      setTimeout(() => {
        contactSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }, 100);
    }
    
    if (contactTrigger) {
      contactTrigger.addEventListener('click', (e) => {
        e.preventDefault();
        if (!contactSection.classList.contains('visible')) {
          showContactForm();
        } else {
          contactSection.scrollIntoView({ behavior: 'smooth' });
        }
      });
    }
    
    // ---------- FORM SUBMIT ----------
    const sendBtn = document.getElementById('sendMsgBtn');
    const formContainer = document.getElementById('contact-form-ui');
    const successDiv = document.getElementById('form-success');
    
    function submitFormHandler() {
      const nameInput = document.getElementById('cf-name');
      const emailInput = document.getElementById('cf-email');
      const msgInput = document.getElementById('cf-msg');
      const name = nameInput ? nameInput.value.trim() : '';
      const email = emailInput ? emailInput.value.trim() : '';
      
      if (!name || !email) {
        alert('Please enter your name and email.');
        return;
      }
      if (!email.includes('@') || !email.includes('.')) {
        alert('Please enter a valid email address.');
        return;
      }
      
      if (formContainer && successDiv) {
        formContainer.style.display = 'none';
        successDiv.style.display = 'block';
      }
    }
    
    if (sendBtn) {
      sendBtn.addEventListener('click', submitFormHandler);
    }
    
    // Handle URL hash for contact
    if (window.location.hash === '#contact') {
      showContactForm();
    }
    
    // Warm up audio on first user interaction
    const warmupAudio = () => {
      if (audio && audio.paused) {
        // Just load, don't play
        audio.load();
      }
    };
    document.body.addEventListener('touchstart', warmupAudio, { once: true });
    document.body.addEventListener('click', warmupAudio, { once: true });
  })();
</script>
</body>
</html>
